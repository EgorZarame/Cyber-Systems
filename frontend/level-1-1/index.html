<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 1.1: Первые шаги - КиберСистемс</title>
    <link rel="stylesheet" href="../levels-common.css">
    <style>
        :root {
            --level-color: #00ff88;
            --game-field-bg: #1a1a2e;
            --cell-bg: #1a2a4a;
            --cell-border: #2a3a5a;
            --code-block-bg: #0f3460;
            --code-block-border: #2196F3;
            --code-area-bg: #0a0a1a;
        }

        /* Специфичные стили для уровня 1.1 */
        .drone-moving {
            animation: droneMove 0.3s ease-in-out;
        }

        @keyframes droneMove {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-panel">
        <button class="nav-button" onclick="goBack()">Назад</button>
        <div class="level-title">Уровень 1.1: Первые шаги</div>
        <button class="nav-button" onclick="showHelp()">Помощь</button>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
        <!-- Левая часть - Игровое поле -->
        <div class="left-panel">
            <div class="game-field">
                <div class="field-label">ИГРОВОЕ ПОЛЕ</div>
                <div class="pixel-grid" id="gameGrid">
                    <!-- Игровое поле генерируется JavaScript -->
                </div>
            </div>
        </div>

        <!-- Правая часть - Программирование и консоль -->
        <div class="right-panel">
            <!-- Блок программирования -->
            <div class="programming-section">
                <div class="section-title">ДВИГАТЬСЯ_ВПЕРЕД()</div>
                <div class="blocks-container">
                    <div class="code-block movement" draggable="true" data-action="move">
                        ДВИГАТЬСЯ_ВПЕРЕД()
                    </div>
                </div>
            </div>

            <!-- Область программы -->
            <div class="programming-section">
                <div class="section-title">Ваша программа</div>
                <div class="code-area" id="codeArea">
                    <div class="code-placeholder">Перетащите блоки сюда</div>
                </div>
            </div>

            <!-- Консоль -->
            <div class="console-section">
                <div class="section-title">Консоль</div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-line">Дрон готов</div>
                    <div class="console-line">Используйте ДВИГАТЬСЯ_ВПЕРЕД() чтобы достичь цели</div>
                    <div class="console-line">🎯 Цель: Доберитесь до оранжевой клетки</div>
                </div>
                
                <div class="control-buttons">
                    <button class="control-button run" onclick="runProgram()">Запустить программу</button>
                    <button class="control-button reset" onclick="resetProgram()">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем общий API-клиент -->
    <script src="../api.js"></script>
    <!-- Подключаем базовый класс уровня -->
    <script src="../LevelBase.js"></script>
    <!-- Подключаем класс конкретного уровня -->
    <script src="../level-1-1/level-1-1.js"></script>
</body>
</html>
