<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 2.2: Циклы - КиберСистемс</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        /* Верхняя панель */
        .top-panel {
            background: #151530;
            border-bottom: 2px solid #FF9800;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .level-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #FF9800;
        }

        .nav-button {
            background: transparent;
            color: #FF9800;
            border: 1px solid #FF9800;
            padding: 6px 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-size: 0.9em;
        }

        .nav-button:hover {
            background: #FF9800;
            color: #0a0a1a;
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            padding: 15px;
            gap: 15px;
        }

        /* Левая часть - Игровое поле */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-field {
            flex: 1;
            background: #1a1a2e;
            border: 2px solid #FF9800;
            border-radius: 5px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .field-label {
            color: #FF9800;
            margin-bottom: 10px;
            font-size: 1.1em;
            text-align: center;
        }

        .pixel-grid {
            flex: 1;
            background: #0a1429;
            border: 2px solid #FF9800;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            padding: 10px;
        }

        .grid-cell {
            background: #1a2a4a;
            border-radius: 3px;
            position: relative;
            border: 1px solid #2a3a5a;
        }

        .grid-cell.start {
            background: #4CAF50;
        }

        .grid-cell.finish {
            background: #2196F3;
            animation: finishPulse 2s infinite;
        }

        .grid-cell.obstacle {
            background: #f44336;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.1) 3px,
                rgba(0, 0, 0, 0.1) 6px
            );
        }

        .grid-cell.pattern {
            background: #2d5b88;
            box-shadow: inset 0 0 10px rgba(255, 152, 0, 0.3);
        }

        .drone {
            width: 70%;
            height: 70%;
            background: #8de8ff;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            box-shadow: 0 0 10px rgba(141, 232, 255, 0.7);
            transition: transform 0.3s ease;
        }

        .drone::after {
            content: '▲';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            color: #1a1a2e;
            font-size: 10px;
        }

        .drone.north { transform: rotate(0deg); }
        .drone.east { transform: rotate(90deg); }
        .drone.south { transform: rotate(180deg); }
        .drone.west { transform: rotate(270deg); }

        /* Счетчик циклов */
        .loop-counter {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #FF9800;
            font-size: 0.8em;
        }

        /* Правая часть - Программирование */
        .right-panel {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .programming-section {
            background: #1a1a2e;
            border: 2px solid #FF9800;
            border-radius: 5px;
            padding: 15px;
        }

        .section-title {
            color: #FF9800;
            margin-bottom: 10px;
            font-size: 1em;
            text-align: center;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .code-block {
            background: #0f3460;
            padding: 8px;
            border: 1px solid #2196F3;
            border-radius: 4px;
            cursor: grab;
            color: white;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .code-block.movement {
            border-color: #4CAF50;
            background: #2d5b88;
        }

        .code-block.rotation {
            border-color: #FF9800;
            background: #b36b00;
        }

        .code-block.loop {
            border-color: #9C27B0;
            background: #6a1b9a;
        }

        .loop-content {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }

        .loop-input {
            background: #1a2a4a;
            border: 1px solid #9C27B0;
            border-radius: 3px;
            color: white;
            padding: 2px 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            width: 40px;
            text-align: center;
        }

        .code-area {
            background: #0a0a1a;
            border: 1px dashed #FF9800;
            border-radius: 4px;
            padding: 10px;
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto;
        }

        .code-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }

        .loop-body {
            margin-left: 20px;
            border-left: 2px solid #9C27B0;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Консоль */
        .console-section {
            background: #1a1a2e;
            border: 2px solid #FF9800;
            border-radius: 5px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .console-output {
            flex: 1;
            background: #0a0a1a;
            border: 1px solid #FF9800;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            color: #FF9800;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .console-line {
            margin: 3px 0;
        }

        .console-line::before {
            content: '> ';
            color: #ff9800;
        }

        /* Кнопки управления */
        .control-buttons {
            display: flex;
            gap: 8px;
        }

        .control-button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            color: white;
            font-size: 0.9em;
        }

        .control-button.run {
            background: #4CAF50;
        }

        .control-button.reset {
            background: #f44336;
        }

        /* Анимации */
        @keyframes finishPulse {
            0%, 100% { box-shadow: 0 0 10px #2196F3; }
            50% { box-shadow: 0 0 20px #2196F3, 0 0 30px #2196F3; }
        }

        @keyframes droneMove {
            0% { transform: scale(1) rotate(var(--rotation, 0deg)); }
            50% { transform: scale(1.05) rotate(var(--rotation, 0deg)); }
            100% { transform: scale(1) rotate(var(--rotation, 0deg)); }
        }

        .drone-moving {
            animation: droneMove 0.3s ease-in-out;
        }

        .executing {
            background: #FF9800 !important;
            color: #000 !important;
        }

        .loop-executing {
            border-color: #FF9800 !important;
            background: #FF9800 !important;
            color: #000 !important;
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-panel">
        <button class="nav-button" onclick="goBack()">Назад</button>
        <div class="level-title">Уровень 2.2: Циклы</div>
        <button class="nav-button" onclick="showHelp()">Помощь</button>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
        <!-- Левая часть - Игровое поле -->
        <div class="left-panel">
            <div class="game-field">
                <div class="field-label">ЛАБИРИНТ С ПОВТОРЯЮЩИМИСЯ ПРЕПЯТСТВИЯМИ</div>
                <div class="loop-counter" id="loopCounter">
                    Цикл: <span id="currentLoop">0</span>/<span id="totalLoops">0</span>
                </div>
                <div class="pixel-grid" id="gameGrid">
                    <!-- Игровое поле генерируется JavaScript -->
                </div>
            </div>
        </div>

        <!-- Правая часть - Программирование и консоль -->
        <div class="right-panel">
            <!-- Блоки программирования -->
            <div class="programming-section">
                <div class="section-title">Блоки программирования</div>
                <div class="blocks-container">
                    <div class="code-block movement" draggable="true" data-action="move">
                        ДВИГАТЬСЯ_ВПЕРЕД()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="left">
                        ПОВЕРНУТЬ_НАЛЕВО()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="right">
                        ПОВЕРНУТЬ_НАПРАВО()
                    </div>
                    <div class="code-block loop" draggable="true" data-action="loop">
                        <div class="loop-content">
                            повторить(
                            <input type="number" class="loop-input" value="3" min="1" max="10" onchange="updateLoopCount(this)">
                            )
                        </div>
                    </div>
                </div>
            </div>

            <!-- Область программы -->
            <div class="programming-section">
                <div class="section-title">Программа с циклами</div>
                <div class="code-area" id="codeArea">
                    <div class="code-placeholder">Перетащите блоки сюда</div>
                </div>
            </div>

            <!-- Консоль -->
            <div class="console-section">
                <div class="section-title">Консоль выполнения</div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-line">Система инициализирована</div>
                    <div class="console-line">Используйте циклы для повторяющихся паттернов</div>
                </div>
                
                <div class="control-buttons">
                    <button class="control-button run" onclick="runProgram()">Запустить программу</button>
                    <button class="control-button reset" onclick="resetProgram()">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="level-2-2.js"></script>
</body>
</html>
