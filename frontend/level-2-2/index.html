<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 2.2: Циклы - КиберСистемс</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../levels-common.css">
    <link rel="stylesheet" href="../levels-common2.css">
    <style>
        :root {
            --level-color: #FF9800;
            --game-field-bg: #1a1a2e;
            --code-area-bg: #0a0a1a;
            --cell-bg: #1a2a4a;
            --cell-border: #2a3a5a;
            --code-block-bg: #0f3460;
            --code-block-border: #2196F3;
            --loop-color: #9C27B0;
        }

        body {
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        .top-panel {
            border-bottom-color: var(--level-color);
            background: #151530;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            flex-shrink: 0;
        }

        .level-title {
            color: var(--level-color);
            font-size: 1.2em;
            font-weight: bold;
        }

        .nav-button {
            color: var(--level-color);
            border-color: var(--level-color);
            background: transparent;
            border: 1px solid var(--level-color);
            padding: 6px 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-size: 0.9em;
        }

        .nav-button:hover {
            background: var(--level-color);
            color: #0a0a1a;
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            padding: 15px;
            gap: 15px;
            min-height: 0;
            overflow: hidden;
        }

        /* Левая часть - Игровое поле */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .game-field {
            flex: 1;
            background: var(--game-field-bg, #1a1a2e);
            border: 2px solid var(--level-color, #00ff88);
            border-radius: 5px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        .field-label {
            color: var(--level-color, #00ff88);
            margin-bottom: 10px;
            font-size: 1em;
            text-align: center;
            flex-shrink: 0;
        }

        .pixel-grid {
            flex: 1;
            background: #0a1429;
            border: 2px solid var(--level-color, #00ff88);
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            padding: 10px;
            min-height: 0;
        }

        .grid-cell {
            background: var(--cell-bg, #1a2a4a);
            border-radius: 3px;
            position: relative;
            border: 1px solid var(--cell-border, #2a3a5a);
        }

        .grid-cell.start {
            background: #4CAF50;
        }

        .grid-cell.finish {
            background: #2196F3;
            animation: finishPulse 2s infinite;
        }

        .grid-cell.obstacle {
            background: #b30000;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.2) 3px,
                rgba(0, 0, 0, 0.2) 6px
            );
        }

        /* ИЗМЕНЕНИЕ: Клетки паттернов теперь КРАСНЫЕ */
        .grid-cell.pattern {
            background: #ff4444;
            box-shadow: inset 0 0 10px rgba(255, 68, 68, 0.7);
            border-color: #ff0000;
            animation: patternPulse 2s infinite;
        }

        .drone {
            width: 70%;
            height: 70%;
            background: #8de8ff;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            box-shadow: 0 0 10px rgba(141, 232, 255, 0.7);
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .drone::after {
            content: '▲';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            color: #1a1a2e;
            font-size: 10px;
        }

        .drone.north { transform: rotate(0deg); }
        .drone.east { transform: rotate(90deg); }
        .drone.south { transform: rotate(180deg); }
        .drone.west { transform: rotate(270deg); }

        /* Счетчик циклов */
        .loop-counter {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--level-color, #FF9800);
            font-size: 0.8em;
            z-index: 2;
            flex-shrink: 0;
        }

        /* Правая часть - Программирование */
        .right-panel {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        .programming-section {
            background: var(--game-field-bg, #1a1a2e);
            border: 2px solid var(--level-color, #00ff88);
            border-radius: 5px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section-title {
            color: var(--level-color, #00ff88);
            margin-bottom: 8px;
            font-size: 0.9em;
            text-align: center;
            flex-shrink: 0;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }

        .code-block {
            background: var(--code-block-bg, #0f3460);
            padding: 8px;
            border: 1px solid var(--code-block-border, #2196F3);
            border-radius: 4px;
            cursor: grab;
            color: white;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            flex-shrink: 0;
            word-break: break-word;
        }

        .code-block.movement {
            border-color: #4CAF50;
            background: #2d5b88;
        }

        .code-block.rotation {
            border-color: #FF9800;
            background: #b36b00;
        }

        .code-block.loop {
            border-color: #9C27B0;
            background: #6a1b9a;
        }

        .loop-content {
            display: flex;
            align-items: center;
            gap: 5px;
            justify-content: center;
        }

        .loop-input {
            background: #1a2a4a;
            border: 1px solid #9C27B0;
            border-radius: 3px;
            color: white;
            padding: 2px 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.8em;
            width: 40px;
            text-align: center;
        }

        .code-area {
            background: var(--code-area-bg, #0a0a1a);
            border: 1px dashed var(--level-color, #00ff88);
            border-radius: 4px;
            padding: 10px;
            min-height: 120px;
            max-height: 180px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .code-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 10px;
            font-size: 0.9em;
        }

        .loop-body {
            margin-left: 20px;
            border-left: 2px solid #9C27B0;
            padding-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* КОНСОЛЬ - ИСПРАВЛЕНА */
        .console-section {
            background: var(--game-field-bg, #1a1a2e);
            border: 2px solid var(--level-color, #00ff88);
            border-radius: 5px;
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .console-output {
            flex: 1;
            background: var(--code-area-bg, #0a0a1a);
            border: 1px solid var(--level-color, #00ff88);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            color: var(--level-color, #00ff88);
            overflow-y: auto;
            overflow-x: hidden;
            margin-bottom: 10px;
            font-size: 0.82em;
            min-height: 0;
            word-break: break-all;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
            max-height: 250px;
        }

        .console-line {
            margin: 2px 0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 152, 0, 0.1);
            word-break: break-word;
            white-space: normal;
            font-size: 0.8em;
        }

        .console-line::before {
            content: '> ';
            color: #ff9800;
            margin-right: 4px;
        }

        .log-system { color: #FF9800; }
        .log-warning { color: #ff8800; }
        .log-danger { color: #ff4444; }
        .log-success { color: #4CAF50; }

        /* Кнопки управления */
        .control-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            margin-top: auto;
        }

        .control-button {
            flex: 1;
            padding: 10px 5px;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            color: white;
            font-size: 0.85em;
            min-height: 35px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .control-button.run {
            background: #4CAF50;
        }

        .control-button.reset {
            background: #f44336;
        }

        /* Анимации */
        @keyframes finishPulse {
            0%, 100% { box-shadow: 0 0 10px #2196F3; }
            50% { box-shadow: 0 0 20px #2196F3, 0 0 30px #2196F3; }
        }

        @keyframes patternPulse {
            0%, 100% { 
                background: #ff4444;
                box-shadow: inset 0 0 10px rgba(255, 68, 68, 0.7);
            }
            50% { 
                background: #ff6666;
                box-shadow: inset 0 0 15px rgba(255, 68, 68, 0.9);
            }
        }

        @keyframes droneMove {
            0% { transform: scale(1) rotate(var(--rotation, 0deg)); }
            50% { transform: scale(1.05) rotate(var(--rotation, 0deg)); }
            100% { transform: scale(1) rotate(var(--rotation, 0deg)); }
        }

        .drone-moving {
            animation: droneMove 0.3s ease-in-out;
        }

        .executing {
            background: #FF9800 !important;
            color: #000 !important;
        }

        .loop-executing {
            border-color: #FF9800 !important;
            background: #FF9800 !important;
            color: #000 !important;
        }

        /* Стиль для кнопки завершения цикла */
        .end-loop-btn {
            display: block;
            margin-top: 5px;
            margin-left: 20px;
            background: #9C27B0;
            color: white;
            border: none;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            width: fit-content;
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-panel">
        <button class="nav-button" onclick="goBack()">Назад</button>
        <div class="level-title">Уровень 2.2: Циклы</div>
        <button class="nav-button" onclick="showHelp()">Помощь</button>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
        <!-- Левая часть - Игровое поле -->
        <div class="left-panel">
            <div class="game-field">
                <div class="field-label">ЛАБИРИНТ С ПОВТОРЯЮЩИМИСЯ ПРЕПЯТСТВИЯМИ</div>
                <div class="loop-counter" id="loopCounter" style="display: none;">
                    Цикл: <span id="currentLoop">0</span>/<span id="totalLoops">0</span>
                </div>
                <div class="pixel-grid" id="gameGrid">
                    <!-- Игровое поле генерируется JavaScript -->
                </div>
            </div>
        </div>

        <!-- Правая часть - Программирование и консоль -->
        <div class="right-panel">
            <!-- Блоки программирования -->
            <div class="programming-section">
                <div class="section-title">Блоки программирования</div>
                <div class="blocks-container">
                    <div class="code-block movement" draggable="true" data-action="move">
                        ДВИГАТЬСЯ_ВПЕРЕД()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="left">
                        ПОВЕРНУТЬ_НАЛЕВО()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="right">
                        ПОВЕРНУТЬ_НАПРАВО()
                    </div>
                    <div class="code-block loop" draggable="true" data-action="loop">
                        <div class="loop-content">
                            повторить(
                            <input type="number" class="loop-input" value="3" min="1" max="10">
                            )
                        </div>
                    </div>
                </div>
            </div>

            <!-- Область программы -->
            <div class="programming-section">
                <div class="section-title">Программа с циклами</div>
                <div class="code-area" id="codeArea">
                    <div class="code-placeholder">Перетащите блоки сюда</div>
                </div>
            </div>

            <!-- Консоль -->
            <div class="console-section">
                <div class="section-title">Консоль выполнения</div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-line log-system">Система инициализирована</div>
                    <div class="console-line log-system">Используйте циклы для повторяющихся паттернов</div>
                </div>
                
                <div class="control-buttons">
                    <button class="control-button run" onclick="runProgram()">Запустить программу</button>
                    <button class="control-button reset" onclick="resetProgram()">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- API-клиент и ООП-логика уровня -->
    <script src="../api.js"></script>
    <script src="../LevelBase.js"></script>
    <script src="../LevelBase2.js"></script>
    <script src="../level-2-2/level-2-2.js"></script>
    
    <script>
    let level;

    document.addEventListener('DOMContentLoaded', function() {
        level = new Level2_2();
        level.initialize();
        
        // Глобальные функции для вызова из HTML
        window.goBack = () => level.goBack();
        window.showHelp = () => level.showHelp();
        window.runProgram = () => level.runProgram();
        window.resetProgram = () => level.resetProgram();
        window.updateLoopCount = (element) => level.updateLoopCount(element);
    });

    // Навигация
    function goToLevelMap() {
        window.location.href = '../level-map/index.html';
    }
    </script>
</body>
</html>
