<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 1.3: Босс - Сбойный дрон - КиберСистемс</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #00ff88;
            height: 100vh;
            overflow: hidden;
        }

        /* Верхняя панель */
        .top-panel {
            background: #151530;
            border-bottom: 2px solid #ff4444;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .level-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #ff4444;
        }

        .nav-button {
            background: transparent;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 6px 12px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            font-size: 0.9em;
        }

        .nav-button:hover {
            background: #ff4444;
            color: #0a0a1a;
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
            padding: 15px;
            gap: 15px;
        }

        /* Левая часть - Игровое поле */
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .game-field {
            flex: 1;
            background: #1a0a0a;
            border: 2px solid #ff4444;
            border-radius: 5px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .field-label {
            color: #ff4444;
            margin-bottom: 10px;
            font-size: 1.1em;
            text-align: center;
        }

        .pixel-grid {
            flex: 1;
            background: #0a1429;
            border: 2px solid #ff4444;
            border-radius: 5px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 2px;
            padding: 10px;
        }

        .grid-cell {
            background: #2a1515;
            border-radius: 3px;
            position: relative;
            border: 1px solid #3a2525;
        }

        .grid-cell.start {
            background: #4CAF50;
        }

        .grid-cell.finish {
            background: #FF9800;
            animation: bossPulse 2s infinite;
        }

        .grid-cell.obstacle {
            background: #f44336;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.1) 3px,
                rgba(0, 0, 0, 0.1) 6px
            );
        }

        .grid-cell.boss-area {
            background: #ff0000;
            animation: bossGlow 1.5s infinite alternate;
        }

        .drone {
            width: 70%;
            height: 70%;
            background: #8de8ff;
            border-radius: 50%;
            position: absolute;
            top: 15%;
            left: 15%;
            box-shadow: 0 0 10px rgba(141, 232, 255, 0.7);
            transition: transform 0.3s ease;
            z-index: 2;
        }

        .drone::after {
            content: '▲';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            color: #1a1a2e;
            font-size: 10px;
        }

        .boss-drone {
            width: 80%;
            height: 80%;
            background: #ff4444;
            border-radius: 50%;
            position: absolute;
            top: 10%;
            left: 10%;
            box-shadow: 0 0 15px #ff0000;
            animation: bossFloat 3s infinite ease-in-out;
            z-index: 1;
        }

        .boss-drone::after {
            content: '☠️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
        }

        .drone.north { transform: rotate(0deg); }
        .drone.east { transform: rotate(90deg); }
        .drone.south { transform: rotate(180deg); }
        .drone.west { transform: rotate(270deg); }

        /* Панель здоровья босса */
        .boss-health {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ff4444;
            font-size: 0.8em;
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 3px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            width: 100%;
            transition: width 0.3s ease;
        }

        /* Правая часть - Программирование */
        .right-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .programming-section {
            background: #1a0a0a;
            border: 2px solid #ff4444;
            border-radius: 5px;
            padding: 15px;
        }

        .section-title {
            color: #ff4444;
            margin-bottom: 10px;
            font-size: 1em;
            text-align: center;
        }

        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .code-block {
            background: #2a1515;
            padding: 8px;
            border: 1px solid #2196F3;
            border-radius: 4px;
            cursor: grab;
            color: white;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .code-block.movement {
            border-color: #4CAF50;
            background: #2d5b88;
        }

        .code-block.rotation {
            border-color: #FF9800;
            background: #b36b00;
        }

        .code-block.attack {
            border-color: #ff4444;
            background: #8b0000;
            animation: attackPulse 1.5s infinite;
        }

        .code-area {
            background: #0a0a0a;
            border: 1px dashed #ff4444;
            border-radius: 4px;
            padding: 10px;
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
        }

        .code-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 10px;
        }

        /* Консоль */
        .console-section {
            background: #1a0a0a;
            border: 2px solid #ff4444;
            border-radius: 5px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .console-output {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #ff4444;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            color: #ff4444;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .console-line {
            margin: 3px 0;
        }

        .console-line::before {
            content: '> ';
            color: #ff9800;
        }

        .log-player { color: #8de8ff; }
        .log-boss { color: #ff4444; }
        .log-success { color: #4CAF50; }

        /* Кнопки управления */
        .control-buttons {
            display: flex;
            gap: 8px;
        }

        .control-button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            color: white;
            font-size: 0.9em;
        }

        .control-button.run {
            background: #4CAF50;
        }

        .control-button.reset {
            background: #f44336;
        }

        /* Анимации */
        @keyframes droneMove {
            0% { transform: scale(1) rotate(var(--rotation, 0deg)); }
            50% { transform: scale(1.05) rotate(var(--rotation, 0deg)); }
            100% { transform: scale(1) rotate(var(--rotation, 0deg)); }
        }

        @keyframes bossPulse {
            0%, 100% { box-shadow: 0 0 10px #FF9800; }
            50% { box-shadow: 0 0 20px #FF9800, 0 0 30px #FF9800; }
        }

        @keyframes bossGlow {
            0% { box-shadow: inset 0 0 10px #ff0000; }
            100% { box-shadow: inset 0 0 20px #ff4444; }
        }

        @keyframes bossFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes attackPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .drone-moving {
            animation: droneMove 0.3s ease-in-out;
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-panel">
        <button class="nav-button" onclick="goBack()">Назад</button>
        <div class="level-title">Уровень 1.3: Босс - Сбойный дрон</div>
        <button class="nav-button" onclick="showHelp()">Помощь</button>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
        <!-- Левая часть - Игровое поле -->
        <div class="left-panel">
            <div class="game-field">
                <div class="field-label">ИГРОВОЕ ПОЛЕ</div>
                <div class="boss-health">
                    <div>Здоровье босса: <span id="healthText">100%</span></div>
                    <div class="health-bar">
                        <div class="health-fill" id="bossHealth" style="width: 100%"></div>
                    </div>
                </div>
                <div class="pixel-grid" id="gameGrid">
                    <!-- Игровое поле генерируется JavaScript -->
                </div>
            </div>
        </div>

        <!-- Правая часть - Программирование и консоль -->
        <div class="right-panel">
            <!-- Блоки программирования -->
            <div class="programming-section">
                <div class="section-title">Блоки программирования</div>
                <div class="blocks-container">
                    <div class="code-block movement" draggable="true" data-action="move">
                        ДВИГАТЬСЯ_ВПЕРЕД()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="left">
                        ПОВЕРНУТЬ_НАЛЕВО()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="right">
                        ПОВЕРНУТЬ_НАПРАВО()
                    </div>
                    <div class="code-block attack" draggable="true" data-action="attack">
                        АТАКОВАТЬ_БОССА()
                    </div>
                </div>
            </div>

            <!-- Область программы -->
            <div class="programming-section">
                <div class="section-title">Боевая программа</div>
                <div class="code-area" id="codeArea">
                    <div class="code-placeholder">Перетащите блоки сюда</div>
                </div>
            </div>

            <!-- Консоль -->
            <div class="console-section">
                <div class="section-title">Консоль боя</div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-line log-boss">⚠️ Обнаружен сбойный дрон!</div>
                    <div class="console-line log-boss">⚡ Уничтожьте босса для восстановления системы</div>
                </div>
                
                <div class="control-buttons">
                    <button class="control-button run" onclick="runProgram()">Запустить атаку</button>
                    <button class="control-button reset" onclick="resetProgram()">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <script src="level-1-3.js"></script>
</body>
</html>
