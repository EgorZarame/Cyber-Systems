<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 1.3: Босс - Сбойный дрон - КиберСистемс</title>
    <link rel="stylesheet" href="../levels-common.css">
    <style>
        :root {
            --level-color: #ff4444;
            --game-field-bg: #1a0a0a;
            --cell-bg: #2a1515;
            --cell-border: #3a2525;
            --code-block-bg: #2a1515;
            --code-block-border: #ff4444;
            --code-area-bg: #0a0a0a;
        }

        /* Специфичные стили для уровня 1.3 (Босс) */
        .boss-health {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ff4444;
            font-size: 0.8em;
            z-index: 10;
            flex-shrink: 0;
        }

        .health-bar {
            width: 150px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 3px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            width: 100%;
            transition: width 0.3s ease;
        }

        .grid-cell.boss-area {
            animation: bossPulse 2s infinite;
        }

        @keyframes bossPulse {
            0%, 100% { 
                box-shadow: inset 0 0 10px #ff0000, 0 0 10px #FF9800; 
            }
            50% { 
                box-shadow: inset 0 0 20px #ff4444, 0 0 20px #FF9800; 
            }
        }

        .boss-drone {
            width: 80%;
            height: 80%;
            background: #ff4444;
            border-radius: 50%;
            position: absolute;
            top: 10%;
            left: 10%;
            box-shadow: 0 0 15px #ff0000;
            animation: bossFloat 3s infinite ease-in-out;
            z-index: 1;
        }

        .boss-drone::after {
            content: '☠️';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
        }

        @keyframes bossFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .drone-moving {
            animation: droneMove 0.3s ease-in-out;
        }

        @keyframes droneMove {
            0% { transform: scale(1) rotate(var(--rotation, 0deg)); }
            50% { transform: scale(1.05) rotate(var(--rotation, 0deg)); }
            100% { transform: scale(1) rotate(var(--rotation, 0deg)); }
        }

        .code-block.attack {
            animation: attackPulse 1.5s infinite;
        }

        @keyframes attackPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 5px #ff0000; }
            50% { transform: scale(1.05); box-shadow: 0 0 10px #ff0000; }
        }

        .log-boss { 
            color: #ff4444; 
            font-weight: bold;
        }

        .log-success { 
            color: #4CAF50; 
            font-weight: bold;
        }

        .log-player { 
            color: #8de8ff; 
        }
    </style>
</head>
<body>
    <!-- Верхняя панель -->
    <div class="top-panel">
        <button class="nav-button" onclick="goBack()">Назад</button>
        <div class="level-title">Уровень 1.3: Босс - Сбойный дрон</div>
        <button class="nav-button" onclick="showHelp()">Помощь</button>
    </div>

    <!-- Основной контейнер -->
    <div class="main-container">
        <!-- Левая часть - Игровое поле -->
        <div class="left-panel">
            <div class="game-field">
                <div class="field-label">ИГРОВОЕ ПОЛЕ</div>
                <div class="boss-health">
                    <div>Здоровье босса: <span id="healthText">100%</span></div>
                    <div class="health-bar">
                        <div class="health-fill" id="bossHealth" style="width: 100%"></div>
                    </div>
                </div>
                <div class="pixel-grid" id="gameGrid">
                    <!-- Игровое поле генерируется JavaScript -->
                </div>
            </div>
        </div>

        <!-- Правая часть - Программирование и консоль -->
        <div class="right-panel">
            <!-- Блоки программирования -->
            <div class="programming-section">
                <div class="section-title">Боевые команды</div>
                <div class="blocks-container">
                    <div class="code-block movement" draggable="true" data-action="move">
                        ДВИГАТЬСЯ_ВПЕРЕД()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="left">
                        ПОВЕРНУТЬ_НАЛЕВО()
                    </div>
                    <div class="code-block rotation" draggable="true" data-action="right">
                        ПОВЕРНУТЬ_НАПРАВО()
                    </div>
                    <div class="code-block attack" draggable="true" data-action="attack">
                        АТАКОВАТЬ_БОССА()
                    </div>
                </div>
            </div>

            <!-- Область программы -->
            <div class="programming-section">
                <div class="section-title">Боевая программа</div>
                <div class="code-area" id="codeArea">
                    <div class="code-placeholder">Перетащите блоки сюда</div>
                </div>
            </div>

            <!-- Консоль -->
            <div class="console-section">
                <div class="section-title">Консоль боя</div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-line log-boss">⚠️ Обнаружен сбойный дрон!</div>
                    <div class="console-line log-boss">⚡ Уничтожьте босса для восстановления системы</div>
                </div>
                
                <div class="control-buttons">
                    <button class="control-button run" onclick="runProgram()">Запустить атаку</button>
                    <button class="control-button reset" onclick="resetProgram()">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем общий API-клиент -->
    <script src="../api.js"></script>
    <!-- Подключаем базовый класс уровня -->
    <script src="../LevelBase.js"></script>
    <!-- Подключаем класс конкретного уровня -->
    <script src="level-1-3.js"></script>
</body>
</html>
