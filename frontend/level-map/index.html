<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта уровней - КиберСистемс</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.2);
            z-index: -1;
        }
        
        /* Шапка */
        .main-header {
            background: rgba(21, 21, 48, 0);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 2px solid rgba(0, 255, 136, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .main-nav {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #00ff88;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: #00ff88;
            color: #0a0a1a;
            box-shadow: 0 0 10px #00ff88;
        }
        
        /* Карта офиса */
        .office-map {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 30px;
        }
        
        .department {
            margin-bottom: 50px;
            padding: 20px;
            border: 2px solid #00ff88;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
        }
        
        .department.locked {
            opacity: 0.5;
            border-color: #7a7a7a;
        }
        
        .department h2 {
            color: #00ff88;
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
        }
        
        .levels {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }
        
        .level {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffd700;
            background: #151530;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .level.unlocked:hover {
            background: #ffd700;
            color: #0a0a1a;
            box-shadow: 0 0 15px #ffd700;
            transform: scale(1.1);
        }
        
        .level.locked {
            border-color: #7a7a7a;
            color: #7a7a7a;
            cursor: not-allowed;
        }
        
        .level.boss {
            border-color: #ff0088;
            color: #ff0088;
        }
        
        .level.boss.unlocked:hover {
            background: #ff0088;
            color: #ffffff;
            box-shadow: 0 0 20px #ff0088;
        }
        
        .department-title {
            text-align: center;
            margin-bottom: 10px;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <!-- Логотип и навигация -->
    <header class="main-header">
        <div class="logo">🔷 КИБЕРСИСТЕМС</div>
        <nav class="main-nav">
            <button class="nav-btn" onclick="location.href='../home/index.html'">ГЛАВНАЯ</button>
            <button class="nav-btn active">КАРТА</button>
            <button class="nav-btn">НАСТРОЙКИ</button>
            <button class="nav-btn">СПРАВКА</button>
        </nav>
    </header>

    <!-- Карта офиса -->
    <div class="office-map">
        <!-- Отдел дронов -->
        <section class="department" id="drones-department">
            <div class="department-title">📦 ОТДЕЛ ДРОНОВ</div>
            <h2>Кризис почтовых дронов</h2>
            <div class="levels">
                <div class="level unlocked" data-level="1.1" onclick="startLevel('1.1')">
                    <span>1.1</span>
                </div>
                <div class="level unlocked" data-level="1.2" onclick="startLevel('1.2')">
                    <span>1.2</span>
                </div>
                <div class="level boss unlocked" data-level="1.boss" onclick="startLevel('1.boss')">
                    <span>БОСС</span>
                </div>
            </div>
        </section>

        <!-- Охранные системы -->
        <section class="department unlocked" id="security-department">
            <div class="department-title">🔒 ОХРАННЫЕ СИСТЕМЫ</div>
            <h2>Взлом системы безопасности</h2>
            <div class="levels">
                <div class="level unlocked" data-level="2.1" onclick="startLevel('2.1')">
                    <span>2.1</span>
                </div>
                <div class="level unlocked" data-level="2.2" onclick="startLevel('2.2')">
                    <span>2.2</span>
                </div>
                <div class="level boss unlocked" data-level="2.boss" onclick="startLevel('2.boss')">
                    <span>БОСС</span>
                </div>
            </div>
        </section>

        <!-- Центральное ядро -->
        <section class="department unlocked" id="core-department">
            <div class="department-title">⚡ ЦЕНТРАЛЬНОЕ ЯДРО</div>
            <h2>Спасение ядра ИИ</h2>
            <div class="levels">
                <div class="level unlocked" data-level="3.1" onclick="startLevel('3.1')">
                    <span>3.1</span>
                </div>
                <div class="level unlocked" data-level="3.2" onclick="startLevel('3.2')">
                    <span>3.2</span>
                </div>
                <div class="level boss unlocked" data-level="3.boss" onclick="startLevel('3.boss')">
                    <span>БОСС</span>
                </div>
            </div>
        </section>
    </div>

    <script src="../api.js"></script>
    <script>
        let allLevels = [];
        let currentProfile = null;

        // Логика карты уровней
        function startLevel(levelId) {
    console.log('🚀 Запуск уровня:', levelId);
    
    // Определяем путь к уровню на основе его ID
    let levelPath;
    switch(levelId) {
        case '1.1':
            levelPath = '../level-1-1/index.html';
            break;
        case '1.2':
            levelPath = '../level-1-2/index.html';
            break;
        case '1.boss':
            levelPath = '../level-1-3/index.html';
            break;
        case '2.1':
            levelPath = '../level-2-1/index.html';
            break;
        case '2.2':
            levelPath = '../level-2-2/index.html';
            break;
        case '2.boss':
            levelPath = '../level-2-3/index.html';
            break;
        case '3.1':
            levelPath = '../level-3-1/index.html';
            break;
        case '3.2':
            levelPath = '../level-3-2/index.html';
            break;
        case '3.boss':
            levelPath = '../level-3-3/index.html';
            break;
        default:
            levelPath = '../level-1-1/index.html'; // fallback
    }
    
    // Сохраняем выбранный уровень в localStorage
    localStorage.setItem('currentLevel', levelId);
    
    // Переход к уровню
    window.location.href = levelPath + '?level=' + levelId;
}

        // Загрузка уровней и профиля с бэкенда
        async function loadGameData() {
            console.log('🗺️ Загрузка данных игры...');
            
            // Загружаем уровни и профиль параллельно
            [allLevels, currentProfile] = await Promise.all([
                fetchLevels(),
                fetchProfile()
            ]);
            
            console.log('Загружено уровней:', allLevels.length);
            console.log('Текущий профиль:', currentProfile);
            
            // Рендерим уровни динамически
            renderLevels();
            
            // Разблокировка на основе прогресса
            if (currentProfile) {
                unlockLevels(currentProfile.currentLevelId);
            } else {
                unlockLevels('1.1'); // По умолчанию
            }
        }

        // Рендеринг уровней из API
        function renderLevels() {
            // Группируем уровни по отделам
            const departments = {
                'DRONES': { element: document.getElementById('drones-department'), levels: [] },
                'SECURITY': { element: document.getElementById('security-department'), levels: [] },
                'CORE': { element: document.getElementById('core-department'), levels: [] }
            };
            
            allLevels.forEach(level => {
                const dept = departments[level.type];
                if (dept) {
                    dept.levels.push(level);
                }
            });
            
            // Очищаем и заполняем каждый отдел
            Object.entries(departments).forEach(([type, dept]) => {
                if (!dept.element) return;
                
                const levelsContainer = dept.element.querySelector('.levels');
                if (!levelsContainer) return;
                
                levelsContainer.innerHTML = '';
                
                dept.levels.forEach(level => {
                    // ПРОПУСКАЕМ УРОВЕНЬ 1.3, 2.3, 3.3
                    if (level.id === '1.3' || level.id === '2.3' || level.id === '3.3') {
                        return; // пропускаем этот уровень
                    }
                    
                    const levelDiv = document.createElement('div');
                    levelDiv.className = `level ${level.difficulty === 'BOSS' ? 'boss' : ''}`;
                    levelDiv.dataset.level = level.id;
                    levelDiv.onclick = () => startLevel(level.id);
                    
                    const label = level.difficulty === 'BOSS' ? 'БОСС' : level.id;
                    levelDiv.innerHTML = `<span>${label}</span>`;
                    
                    levelsContainer.appendChild(levelDiv);
                });
            });
        }

        function unlockLevels(currentLevelId) {
    if (!currentLevelId) {
        console.warn('Текущий уровень не указан');
        return;
    }
    
    const currentLevel = allLevels.find(l => l.id === currentLevelId);
    if (!currentLevel) {
        console.warn('Уровень не найден:', currentLevelId);
        // Разблокируем только первый уровень
        const firstLevel = allLevels.find(l => l.id === '1.1');
        if (firstLevel) {
            unlockLevels('1.1');
        }
        return;
    }
    
    const currentOrderIndex = currentLevel.orderIndex;
    console.log('Разблокировка уровней до orderIndex:', currentOrderIndex);
    
    const levelElements = document.querySelectorAll('.level');
    levelElements.forEach(levelEl => {
        const levelId = levelEl.dataset.level;
        const level = allLevels.find(l => l.id === levelId);
        
        if (level && level.orderIndex <= currentOrderIndex) {
            levelEl.classList.remove('locked');
            levelEl.classList.add('unlocked');
        } else {
            levelEl.classList.remove('unlocked');
            levelEl.classList.add('locked');
        }
    });
    
    // Разблокировка отделов
    const securityDept = document.getElementById('security-department');
    const coreDept = document.getElementById('core-department');
    
    // После 1.2 разблокируем охранные системы
    if (currentOrderIndex >= 2) { // После уровня 1.2
        securityDept?.classList.remove('locked');
    }
    // После 2.2 разблокируем центральное ядро
    if (currentOrderIndex >= 6) { // После уровня 2.2
        coreDept?.classList.remove('locked');
    }
}

        // Установка фона офиса
        function setupBackground() {
            console.log('🖼️ Начало установки фона...');
            
            // Пробуем разные пути к фону
            const possiblePaths = [
                '../assets/images/backgrounds/office_bg.png',
                'assets/images/backgrounds/office_bg.png',
                '../assets/backgrounds/office-bg.png',
                'assets/backgrounds/office-bg.png',
            ];
            
            const body = document.body;
            
            // Функция для попытки загрузки фона
            function tryBackground(pathIndex) {
                if (pathIndex >= possiblePaths.length) {
                    console.error('❌ Все пути к фону не работают. Использую CSS фон.');
                    setCSSBackground();
                    return;
                }
                
                const bgPath = possiblePaths[pathIndex];
                console.log(`🔄 Пробуем путь ${pathIndex + 1}:`, bgPath);
                
                const bgImg = new Image();
                bgImg.onload = function() {
                    console.log('✅ Фон загружен успешно:', bgPath);
                    body.style.backgroundImage = `url('${bgPath}')`;
                    body.style.backgroundSize = 'cover';
                    body.style.backgroundPosition = 'center';
                    body.style.backgroundRepeat = 'no-repeat';
                    body.style.backgroundAttachment = 'fixed';
                };
                bgImg.onerror = function() {
                    console.warn('❌ Не удалось загрузить:', bgPath);
                    tryBackground(pathIndex + 1); // Пробуем следующий путь
                };
                bgImg.src = bgPath;
            }
            
            // Функция для CSS фона (если картинки не работают)
            function setCSSBackground() {
                body.style.background = `
                    radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 0, 136, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 40% 40%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                    linear-gradient(135deg, #0a0a1a 0%, #151530 50%, #1a1a2e 100%)
                `;
                console.log('✅ Установлен CSS фон');
            }
            
            // Начинаем попытки загрузки
            tryBackground(0);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🗺️ Карта уровней загружена');
            console.log('🔧 Вызываю setupBackground...');
            setupBackground();
            loadGameData();
        });
    </script>
</body>
</html>
