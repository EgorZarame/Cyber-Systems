<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КиберСистемс - Главная</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Шапка */
        .main-header {
            background: #151530;
            padding: 15px 30px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .main-nav {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #00ff88;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: #00ff88;
            color: #0a0a1a;
            box-shadow: 0 0 10px #00ff88;
        }
        
        /* Индикатор карьеры */
        .career-track {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            padding: 0 30px;
        }
        
        .career-stage {
            padding: 10px 20px;
            border: 1px solid #7a7a7a;
            color: #7a7a7a;
            text-align: center;
            min-width: 120px;
        }
        
        .career-stage.active {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 15px #ffd700;
        }
        
        /* Основной контент */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 50px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
        }
        
        .character-display {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            border: 2px solid #ffd700;
            min-height: 400px;
            border-radius: 10px;
        }
        
        .character-placeholder {
            font-size: 80px;
            opacity: 0.7;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }
        
        .menu-btn {
            padding: 20px 30px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            border: 2px solid;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border-radius: 5px;
        }
        
        .menu-btn.primary {
            background: #00ff88;
            color: #0a0a1a;
            border-color: #00ff88;
            font-weight: bold;
        }
        
        .menu-btn.primary:hover {
            box-shadow: 0 0 20px #00ff88;
            transform: translateY(-2px);
        }
        
        .menu-btn.secondary {
            background: transparent;
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .menu-btn.secondary:hover {
            background: #ffd700;
            color: #0a0a1a;
            box-shadow: 0 0 15px #ffd700;
        }
    </style>
</head>
<body>
    <!-- Логотип и навигация -->
    <header class="main-header">
        <div class="logo">🔷 КИБЕРСИСТЕМС</div>
        <nav class="main-nav">
            <button class="nav-btn active">ГЛАВНАЯ</button>
            <button class="nav-btn" onclick="location.href='../level-map/index.html'">КАРТА</button>
            <button class="nav-btn">НАСТРОЙКИ</button>
            <button class="nav-btn">СПРАВКА</button>
        </nav>
    </header>

    <!-- Индикатор карьеры -->
    <div class="career-track">
        <div class="career-stage active">СТАЖЕР</div>
        <div class="career-stage">JUNIOR</div>
        <div class="career-stage">DEVELOPER</div>
        <div class="career-stage">SENIOR</div>
    </div>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="character-display">
            <div class="character-placeholder">👨‍💼</div>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn primary" onclick="location.href='../level-map/index.html'">
                НАЧАТЬ ИГРУ
            </button>
            <button class="menu-btn secondary" onclick="continueGame()">
                ПРОДОЛЖИТЬ
            </button>
            <button class="menu-btn secondary">
                НАСТРОЙКИ
            </button>
            <button class="menu-btn secondary">
                СПРАВКА
            </button>
        </div>
    </main>

    <script src="../api.js"></script>
    <script>
        let currentProfile = null;

        // Логика главного меню
        async function continueGame() {
            const profile = await fetchProfile();
            if (profile && profile.currentLevelId) {
                location.href = '../level-map/index.html';
            } else {
                alert('Нет сохраненной игры. Начни новую игру!');
            }
        }

        // Обновление прогресса карьеры на основе текущего уровня
        function updateCareerProgress() {
            if (!currentProfile) return;
            
            const stages = document.querySelectorAll('.career-stage');
            stages.forEach((stage, index) => {
                stage.classList.remove('active');
            });
            
            // Определяем стадию карьеры на основе текущего уровня
            const levelId = currentProfile.currentLevelId;
            let stageIndex = 0; // СТАЖЕР по умолчанию
            
            if (levelId && levelId.startsWith('2.')) {
                stageIndex = 1; // JUNIOR
            } else if (levelId && levelId.startsWith('3.')) {
                stageIndex = 2; // DEVELOPER
            } else if (levelId && levelId.includes('boss')) {
                stageIndex = 3; // SENIOR
            }
            
            if (stages[stageIndex]) {
                stages[stageIndex].classList.add('active');
            }
        }

        // Загрузка профиля при загрузке страницы
        async function loadProfile() {
            currentProfile = await fetchProfile();
            if (currentProfile) {
                console.log('Профиль загружен:', currentProfile);
                // Можно отобразить никнейм, если нужно
            }
            updateCareerProgress();
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('🏠 Главное меню загружено');
            loadProfile();
        });
    </script>
</body>
</html>
