<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КиберСистемс - Главная</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.2);
            z-index: -1;
        }
        
        /* Шапка */
        .main-header {
            background: rgba(21, 21, 48, 0);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 2px solid rgba(0, 255, 136, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        
        .main-nav {
            display: flex;
            gap: 10px;
        }
        
        .nav-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #00ff88;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-btn:hover, .nav-btn.active {
            background: #00ff88;
            color: #0a0a1a;
            box-shadow: 0 0 10px #00ff88;
        }
        
        /* Индикатор карьеры */
        .career-track {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            padding: 0 30px;
        }
        
        .career-stage {
            padding: 10px 20px;
            border: 1px solid #7a7a7a;
            color: #7a7a7a;
            text-align: center;
            min-width: 120px;
        }
        
        .career-stage.active {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 15px #ffd700;
        }
        
        /* Основной контент */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 50px;
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
        }
        
        .character-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.8);
            border: 2px solid #ffd700;
            width: 200px;
            height: 220px;
            border-radius: 10px;
            position: relative;
            overflow: visible;
            padding: 5px;
            /* ДОБАВЛЕНО: аватар чуть ниже */
            margin-top: 40px;
        }
        
        .character-avatar {
            width: 240px;
            height: 240px;
            object-fit: contain;
            margin-bottom: 8px;
        }
        
        .character-name {
            font-size: 16px;
            color: #ffd700;
            text-align: center;
            margin-top: 5px;
        }
        
        .character-placeholder {
            font-size: 80px;
            opacity: 0.7;
            display: none;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }
        
        .menu-btn {
            padding: 20px 30px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            border: 2px solid;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border-radius: 5px;
        }
        
        .menu-btn.primary {
            background: #00ff88;
            color: #0a0a1a;
            border-color: #00ff88;
            font-weight: bold;
        }
        
        .menu-btn.primary:hover {
            box-shadow: 0 0 20px #00ff88;
            transform: translateY(-2px);
        }
        
        .menu-btn.secondary {
            background: transparent;
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .menu-btn.secondary:hover {
            background: #ffd700;
            color: #0a0a1a;
            box-shadow: 0 0 15px #ffd700;
        }
    </style>
</head>
<body>
    <!-- Логотип и навигация -->
    <header class="main-header">
        <div class="logo">🔷 КИБЕРСИСТЕМС</div>
        <nav class="main-nav">
            <button class="nav-btn active">ГЛАВНАЯ</button>
            <button class="nav-btn" onclick="location.href='../level-map/index.html'">КАРТА</button>
            <button class="nav-btn">НАСТРОЙКИ</button>
            <button class="nav-btn">СПРАВКА</button>
        </nav>
    </header>

    <!-- Индикатор карьеры -->
    <div class="career-track">
        <div class="career-stage active">СТАЖЕР</div>
        <div class="career-stage">JUNIOR</div>
        <div class="career-stage">DEVELOPER</div>
        <div class="career-stage">SENIOR</div>
    </div>

    <!-- Основной контент -->
    <main class="main-content">
        <div class="character-display">
            <img id="character-avatar" class="character-avatar" alt="Аватар персонажа" onerror="this.style.display='none'; document.querySelector('.character-placeholder').style.display='block';">
            <div class="character-placeholder">👨‍💼</div>
            <div class="character-name" id="character-name">Стажер</div>
        </div>

        <div class="menu-buttons">
            <button class="menu-btn primary" onclick="location.href='../level-map/index.html'">
                НАЧАТЬ ИГРУ
            </button>
            <button class="menu-btn secondary" onclick="continueGame()">
                ПРОДОЛЖИТЬ
            </button>
            <button class="menu-btn secondary">
                НАСТРОЙКИ
            </button>
            <button class="menu-btn secondary">
                СПРАВКА
            </button>
        </div>
    </main>

    <script src="../api.js"></script>
    <script>
        let currentProfile = null;

        // ТОЧНО ТАКАЯ ЖЕ ФУНКЦИЯ КАК В КАРТЕ УРОВНЕЙ
        function setupBackground() {
            console.log('🖼️ Начало установки фона...');
            
            // Пробуем разные пути к фону
            const possiblePaths = [
                '../assets/images/backgrounds/office_bg.png',
                'assets/images/backgrounds/office_bg.png',
                '../assets/backgrounds/office-bg.png',
                'assets/backgrounds/office-bg.png',
                // Добавь сюда реальный путь к твоему файлу
            ];
            
            const body = document.body;
            
            // Функция для попытки загрузки фона
            function tryBackground(pathIndex) {
                if (pathIndex >= possiblePaths.length) {
                    console.error('❌ Все пути к фону не работают. Использую CSS фон.');
                    setCSSBackground();
                    return;
                }
                
                const bgPath = possiblePaths[pathIndex];
                console.log(`🔄 Пробуем путь ${pathIndex + 1}:`, bgPath);
                
                const bgImg = new Image();
                bgImg.onload = function() {
                    console.log('✅ Фон загружен успешно:', bgPath);
                    body.style.backgroundImage = `url('${bgPath}')`;
                    body.style.backgroundSize = 'cover';
                    body.style.backgroundPosition = 'center';
                    body.style.backgroundRepeat = 'no-repeat';
                    body.style.backgroundAttachment = 'fixed';
                };
                bgImg.onerror = function() {
                    console.warn('❌ Не удалось загрузить:', bgPath);
                    tryBackground(pathIndex + 1); // Пробуем следующий путь
                };
                bgImg.src = bgPath;
            }
            
            // Функция для CSS фона (если картинки не работают)
            function setCSSBackground() {
                body.style.background = `
                    radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(255, 0, 136, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 40% 40%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                    linear-gradient(135deg, #0a0a1a 0%, #151530 50%, #1a1a2e 100%)
                `;
                console.log('✅ Установлен CSS фон');
            }
            
            // Начинаем попытки загрузки
            tryBackground(0);
        }

        // Логика главного меню
        async function continueGame() {
            const profile = await fetchProfile();
            if (profile && profile.currentLevelId) {
                location.href = '../level-map/index.html';
            } else {
                alert('Нет сохраненной игры. Начни новую игру!');
            }
        }

        // Обновление прогресса карьеры на основе текущего уровня
        function updateCareerProgress() {
            if (!currentProfile) return;
            
            const stages = document.querySelectorAll('.career-stage');
            stages.forEach((stage, index) => {
                stage.classList.remove('active');
            });
            
            // Определяем стадию карьеры на основе текущего уровня
            const levelId = currentProfile.currentLevelId;
            let stageIndex = 0; // СТАЖЕР по умолчанию
            
            if (levelId && levelId.startsWith('2.')) {
                stageIndex = 1; // JUNIOR
            } else if (levelId && levelId.startsWith('3.')) {
                stageIndex = 2; // DEVELOPER
            } else if (levelId && levelId.includes('boss')) {
                stageIndex = 3; // SENIOR
            }
            
            if (stages[stageIndex]) {
                stages[stageIndex].classList.add('active');
            }
        }

        // Загрузка профиля при загрузке страницы
        async function loadProfile() {
            try {
                currentProfile = await fetchProfile();
                if (currentProfile) {
                    console.log('Профиль загружен:', currentProfile);
                    updateCharacterDisplay(currentProfile);
                } else {
                    // Если профиль не загружен, показываем аватар по умолчанию
                    console.log('Профиль не найден, используем значения по умолчанию');
                    updateCharacterDisplay({ currentLevelId: '1.1' });
                }
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                // В случае ошибки показываем аватар по умолчанию
                updateCharacterDisplay({ currentLevelId: '1.1' });
            }
            updateCareerProgress();
        }
        
        // Обновление отображения персонажа на основе профиля
        function updateCharacterDisplay(profile) {
            const avatarImg = document.getElementById('character-avatar');
            const characterName = document.getElementById('character-name');
            
            if (!avatarImg || !characterName) return;
            
            // Определяем базовый путь
            const basePath = window.location.protocol === 'file:' ? '../' : '/';
            const avatarBasePath = basePath + 'assets/images/avatars/';
            
            // Определяем аватар на основе уровня карьеры
            let avatarFile = 'intern.png';
            let characterTitle = 'Стажер';
            
            if (profile.currentLevelId) {
                if (profile.currentLevelId.startsWith('2.')) {
                    avatarFile = 'junior.png';
                    characterTitle = 'Junior Developer';
                } else if (profile.currentLevelId.startsWith('3.')) {
                    avatarFile = 'developer.png';
                    characterTitle = 'Developer';
                } else if (profile.currentLevelId.includes('boss')) {
                    avatarFile = 'senior.png';
                    characterTitle = 'Senior Developer';
                }
            }
            
            const avatarPath = avatarBasePath + avatarFile;
            console.log('🖼️ Загрузка аватара:', avatarPath);
            
            avatarImg.src = avatarPath;
            characterName.textContent = characterTitle;
            
            // Обработка ошибки загрузки изображения
            avatarImg.onerror = function() {
                console.error('❌ Ошибка загрузки аватара:', avatarPath);
                this.style.display = 'none';
                const placeholder = document.querySelector('.character-placeholder');
                if (placeholder) {
                    placeholder.style.display = 'block';
                }
            };
            
            avatarImg.onload = function() {
                console.log('✅ Аватар загружен:', avatarPath);
                this.style.display = 'block';
                const placeholder = document.querySelector('.character-placeholder');
                if (placeholder) {
                    placeholder.style.display = 'none';
                }
            };
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('🏠 Главное меню загружено');
            console.log('🔧 Вызываю setupBackground...');
            setupBackground(); // ВЫЗЫВАЕМ ТУ ЖЕ ФУНКЦИЮ ЧТО И В КАРТЕ УРОВНЕЙ
            loadProfile();
        });
    </script>
</body>
</html>
