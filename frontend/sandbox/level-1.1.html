<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Уровень 1.1 - КиберСистемс (старый прототип)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace;
            background: #0a0a1a;
            color: #00ff88;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #151530;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            background: transparent;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 8px 16px;
            cursor: pointer;
        }
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #game-canvas {
            border: 3px solid #00ff88;
            background: #1a1a2e;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        .control-btn {
            padding: 10px 20px;
            background: #00ff88;
            color: #0a0a1a;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .console {
            background: #000;
            padding: 10px;
            margin: 10px;
            border: 1px solid #00ff88;
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='../level-map/index.html'">← НАЗАД</button>
        <h2>Уровень 1.1: Первые шаги (старый прототип)</h2>
        <button class="back-btn">ПОМОЩЬ</button>
    </div>

    <div class="game-container">
        <div id="game-canvas"></div>
        <div class="controls">
            <button class="control-btn" onclick="moveDrone()">▶ ЗАПУСТИТЬ</button>
            <button class="control-btn" onclick="resetDrone()">🔄 СБРОС</button>
        </div>
    </div>

    <div class="console" id="console">
        > Дрон готов к работе<br>
        > Ожидание команд...
    </div>

    <script>
        // Простая Phaser сцена (старый прототип)
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 400,
            parent: 'game-canvas',
            scene: {
                preload: preload,
                create: create
            }
        };

        const game = new Phaser.Game(config);
        let drone;

       // === PHASER: ЗАГРУЗКА РЕСУРСОВ ===
function preload() {
    console.log('🖼️ Начало загрузки изображений...');
    
    // Определяем базовый путь (работает и с сервером, и без)
    const basePath = window.location.protocol === 'file:' ? '../' : '/';
    
    // Обработчик успешной загрузки
    this.load.on('filecomplete', function(key, type, data) {
        console.log('✅ Изображение загружено:', key);
    });
    
    // Обработчик ошибок загрузки
    this.load.on('loaderror', function(file) {
        console.error('❌ Ошибка загрузки:', file.key, file.src);
        updateConsole('> ❌ Ошибка загрузки изображения: ' + file.key);
        updateConsole('> Проверьте путь: ' + file.src);
    });
    
    // Обработчик завершения загрузки
    this.load.on('complete', function() {
        console.log('✅ Все ресурсы загружены');
    });
    
    // Загружаем офисный фон и аватары
    const bgPath = basePath + 'assets/images/backgrounds/';
    const avatarPath = basePath + 'assets/images/avatars/';
    
    this.load.image('office_bg', bgPath + 'office_bg.png');
    this.load.image('intern_avatar', avatarPath + 'intern.png');
    this.load.image('drones_department', bgPath + 'drones-department-bg.png');
    
    console.log('📦 Изображения добавлены в очередь загрузки');
    console.log('📁 Базовый путь:', basePath);
}

// === PHASER: СОЗДАНИЕ СЦЕНЫ ===
function create() {
    console.log('🎨 Создание сцены...');
    
    // Проверяем, загружены ли изображения
    const bgTexture = this.textures.get('drones_department');
    const avatarTexture = this.textures.get('intern_avatar');
    
    if (bgTexture && !bgTexture.key.includes('__MISSING')) {
        console.log('✅ Фон найден, добавляем...');
        // ДОБАВЛЯЕМ ОФИСНЫЙ ФОН
        this.add.image(400, 200, 'drones_department').setDisplaySize(800, 400);
    } else {
        console.warn('⚠️ Фон не загружен, используем цветной фон');
        this.add.rectangle(400, 200, 800, 400, 0x1a1a2e);
    }
    
    if (avatarTexture && !avatarTexture.key.includes('__MISSING')) {
        console.log('✅ Аватар найден, добавляем...');
        // Добавляем аватар стажера в угол (как наблюдателя)
        this.add.image(50, 50, 'intern_avatar').setScale(0.3);
    } else {
        console.warn('⚠️ Аватар не загружен');
    }
    
    // Остальная логика уровня (дорога, дрон, точки) поверх фона
    this.add.rectangle(400, 200, 500, 8, 0x00ff88);   // Дорога
    this.add.rectangle(150, 200, 40, 40, 0x00ff88, 0.3); // Старт
    this.add.rectangle(650, 200, 40, 40, 0xff4444, 0.3); // Финиш
    
    drone = this.add.rectangle(150, 200, 30, 30, 0x00ff88);
    
    // Текст с именем игрока и должностью
    this.add.text(80, 35, 'Стажер Иванов', {
        fontSize: '12px',
        fill: '#00ff88',
        fontFamily: 'Courier New'
    });
    
    console.log('✅ Сцена создана');
}

        function moveDrone() {
            if (!drone) {
                updateConsole('> ❌ Дрон не инициализирован');
                return;
            }
            updateConsole('> Запуск программы...');
            updateConsole('> Двигаюсь вперед...');
            
            // Анимация движения
            game.scene.scenes[0].tweens.add({
                targets: drone,
                x: 650,
                duration: 3000,
                ease: 'Power2',
                onComplete: function() {
                    updateConsole('> ✅ Дрон достиг финиша!');
                    updateConsole('> 🎉 Уровень пройден!');
                    setTimeout(() => {
                        alert('Уровень пройден! Возвращаемся на карту...');
                        location.href = '../level-map/index.html';
                    }, 1000);
                }
            });
        }

        function resetDrone() {
            if (!drone) {
                updateConsole('> ❌ Дрон не инициализирован');
                return;
            }
            drone.x = 150;
            updateConsole('> 🔄 Сброс системы...');
            updateConsole('> Дрон возвращен на старт');
        }

        function updateConsole(message) {
            const consoleElem = document.getElementById('console');
            consoleElem.innerHTML += '<br>' + message;
            consoleElem.scrollTop = consoleElem.scrollHeight;
        }

        console.log('✅ Уровень 1.1 (старый прототип) загружен');
    </script>
</body>
</html>
